services:
  postgres:
    image: postgres:16-alpine
    container_name: church-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: church_db
      POSTGRES_USER: church_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U church_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - church-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: church-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4000
      DATABASE_URL: postgresql://church_user:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/church_db?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:4000}
      BASE_URL: ${BASE_URL:-http://localhost:4000}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID}
      APPLE_KEY_ID: ${APPLE_KEY_ID}
      APPLE_PRIVATE_KEY: ${APPLE_PRIVATE_KEY}
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN}
      MP_PUBLIC_KEY: ${MP_PUBLIC_KEY}
      MP_MODO: ${MP_MODO:-development}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_EMAIL: ${VAPID_EMAIL}
      GROQ_API_KEY: ${GROQ_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./backend/src:/app/src
      - backend_uploads:/app/uploads
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    networks:
      - church-network
    develop:
      watch:
        - path: ./backend/src
          action: rebuild

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: church-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    networks:
      - church-network

volumes:
  postgres_data:
  backend_uploads:

networks:
  church-network:
    driver: bridge
