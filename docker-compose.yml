# ─────────────────────────────────────────────────────────────────────────────
# Church System — Docker Compose
#
# Modo DEV LOCAL (sin Neon, DB en container):
#   docker compose --profile dev up -d
#
# Solo backend + DB (más liviano):
#   docker compose --profile dev up -d db backend
#
# Producción local (testear el build final):
#   docker compose --profile prod up -d --build
#
# Limpiar todo:
#   docker compose down -v
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Base de datos local (solo para desarrollo, NO para producción) ──────────
  db:
    image: postgres:16-alpine
    container_name: church-db
    profiles: [dev]
    restart: unless-stopped
    environment:
      POSTGRES_DB: churchsystem
      POSTGRES_USER: church
      POSTGRES_PASSWORD: church_dev_password
    ports:
      - "5433:5432"          # 5433 en host para no pisar Postgres local si existiera
    volumes:
      - church_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U church -d churchsystem"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: church-backend
    profiles: [dev, prod]
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # En modo dev sobreescribir DATABASE_URL para apuntar al container local
      DATABASE_URL: ${DATABASE_URL:-postgresql://church:church_dev_password@db:5432/churchsystem?sslmode=disable}
      NODE_ENV: development
      PORT: "4000"
    ports:
      - "4000:4000"
    volumes:
      - church_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4000/health',(r)=>{process.exit(r.statusCode===200?0:1)})\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Frontend (build de producción servido por nginx) ─────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: church-frontend
    profiles: [prod]
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  church_db_data:
    name: church_db_data
  church_uploads:
    name: church_uploads
