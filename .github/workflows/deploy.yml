name: Church System CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Build frontend ──────────────────────────────────────────
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.5

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Build frontend
        working-directory: frontend
        run: pnpm build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist/
          retention-days: 7

  # ── Lint / syntax check backend ────────────────────────────
  check-backend:
    name: Check backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.5

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install backend deps
        working-directory: backend
        run: pnpm install

      - name: Syntax check (node --check)
        run: |
          find backend/src -name "*.js" -not -path "*/node_modules/*" | while read f; do
            node --check "$f" || exit 1
          done
          echo "All backend files pass syntax check ✓"

  # ── Deploy info ────────────────────────────────────────────
  deploy-info:
    name: Deploy status
    needs: [build-frontend, check-backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Deployment mode
        run: |
          echo "✅ Build y checks pasaron."
          echo "Servidor: Render (auto-deploy on push to master)"
          echo "URL: https://churchsystem.com.ar"
