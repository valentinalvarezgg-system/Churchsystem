name: Church System CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Build frontend ──────────────────────────────────────────
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@9.15.5 --activate

      - name: Verify pnpm is available
        run: pnpm --version

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Build frontend
        working-directory: frontend
        run: pnpm build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist/
          retention-days: 7

  # ── Lint / syntax check backend ────────────────────────────
  check-backend:
    name: Check backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@9.15.5 --activate

      - name: Verify pnpm is available
        run: pnpm --version

      - name: Install backend deps
        working-directory: backend
        run: pnpm install

      - name: Syntax check (node --check)
        run: |
          find backend/src -name "*.js" -not -path "*/node_modules/*" | while read f; do
            node --check "$f" || exit 1
          done
          echo "All backend files pass syntax check ✓"

  # ── Deploy info (Mac local — no SSH needed) ────────────────
  # El servidor corre en Mac local via launchd + Cloudflare Tunnel.
  # El "deploy" es automático: la Mac sirve directamente desde frontend/dist/
  # que está en el repo clonado. Solo hay que hacer git pull en la Mac.
  #
  # Para habilitar deploy automático vía SSH a un VPS en el futuro,
  # configurar estos secrets en GitHub:
  #   SSH_HOST, SSH_USER, SSH_PRIVATE_KEY, SSH_PORT (opcional, default 22)
  deploy-info:
    name: Deploy status
    needs: [build-frontend, check-backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Deployment mode
        run: |
          echo "✅ Build y checks pasaron."
          echo ""
          echo "Servidor: Mac local (launchd + Cloudflare Tunnel)"
          echo "Deploy: git pull manual o automático en la Mac"
          echo "URL: https://churchsystem.com.ar"
          echo ""
          if [ -n "${{ secrets.SSH_HOST }}" ]; then
            echo "SSH secrets detectados — deploy SSH disponible pero deshabilitado en este workflow."
            echo "Habilitar editando deploy.yml cuando se migre a VPS."
          else
            echo "Sin SSH secrets — deploy local únicamente."
          fi
