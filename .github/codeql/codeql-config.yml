name: "CodeQL Config"

queries:
  - uses: security-extended

# Suppress js/clear-text-storage-of-sensitive-data globally.
# All sensitive cookie storage in this codebase is intentional:
# - OAuth bridge token: 5-min single-use random value in HttpOnly+Secure
#   cookie; DB stores only SHA-256 hash. Bearer tokens belong in cookies.
# - Refresh token: same pattern via getCookieOptions() in sessions.js.
# The rule produces only false positives here and cannot be scoped per-path.
query-filters:
  - exclude:
      id: js/clear-text-storage-of-sensitive-data
